[workspace]
members = ["crates/nobiscuit-engine", "crates/nobiscuit-cli"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["kako-jun"]
license = "MIT"
repository = "https://github.com/kako-jun/nobiscuit"

[workspace.dependencies]
nobiscuit-engine = { version = "0.1.0", path = "crates/nobiscuit-engine" }
crossterm = "0.28"
rand = "0.8"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
